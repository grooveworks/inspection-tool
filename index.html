<script>

  authDomain: "inspection-tool-f7c6e.firebaseapp.com",

  messagingSenderId: "316259821956",
  appId: "1:316259821956:web:940bb39c64267a2fe015d1"
};

const COLLECTION = "case_gear_0U9W_46365";

let db = null, useFirebase = false;
try {
  if (FIREBASE_CONFIG.apiKey !== "YOUR_API_KEY") {
    firebase.initializeApp(FIREBASE_CONFIG);
    db = firebase.firestore();

// ═══════════════════════════════════════════
// Storage Layer
// ═══════════════════════════════════════════
const Storage = {
  async load() {
    if (useFirebase) { try { const d = await db.collection(COLLECTION).doc("data").get(); if (d.exists) return d.data(); } catch(e) { console.error(e); } }
    const r = localStorage.getItem(COLLECTION); return r ? JSON.parse(r) : null;
  },
  async save(data) {
    localStorage.setItem(COLLECTION, JSON.stringify(data));
    if (useFirebase) { try { await db.collection(COLLECTION).doc("data").set(data); } catch(e) { console.error(e); } }
  },
  onSync(cb) {
    if (useFirebase) return db.collection(COLLECTION).doc("data").onSnapshot(doc => { if (doc.exists) cb(doc.data()); });
    return null;
  }
};

// ═══════════════════════════════════════════
// State
// ═══════════════════════════════════════════
const ROUNDS = 5;
const r4 = v => Math.round(v * 10000) / 10000;
const DEFAULT_DIMS = [
  {id:1,name:"φ6",tClass:"H8",nominal:6,upper:0.018,lower:0},
  {id:2,name:"φ47",tClass:"P7",nominal:47,upper:-0.017,lower:-0.042},
  {id:3,name:"φ103",tClass:"H7",nominal:103,upper:0.035,lower:0},
  {id:4,name:"φ143",tClass:"H7",nominal:143,upper:0.04,lower:0},
  {id:5,name:"φ60",tClass:"",nominal:60,upper:-0.02,lower:-0.041},
  {id:6,name:"φ130.5",tClass:"",nominal:130.5,upper:0.25,lower:0.05},
  {id:7,name:"φ136.5",tClass:"",nominal:136.5,upper:0.15,lower:0.05},
  {id:8,name:"φ138.5",tClass:"",nominal:138.5,upper:0.25,lower:0.05},
];
let S = { tab:"tracker", dims:DEFAULT_DIMS, meas:{}, inspector:"", date:new Date().toISOString().split("T")[0], serial:"", showEditor:false, editId:null, _form:null };
DEFAULT_DIMS.forEach(d => { S.meas[d.id] = Array(ROUNDS).fill(""); });

function judge(val,nom,up,lo) { if(!val||val==="")return null; const n=parseFloat(val); if(isNaN(n))return null; const dev=r4(n-nom); return dev>=r4(lo)&&dev<=r4(up)?"OK":"NG"; }
function uLim(d){return r4(d.nominal+d.upper);} function lLim(d){return r4(d.nominal+d.lower);}
function dName(d){return d.tClass?d.name+" "+d.tClass:d.name;} function fmtTol(v){return v>0?"+"+v:v===0?"0":""+v;}
function latest(id){const a=S.meas[id]||[];for(let i=a.length-1;i>=0;i--)if(a[i]!=="")return a[i];return "";}

let saveTimer=null;
function scheduleSave(){clearTimeout(saveTimer);saveTimer=setTimeout(()=>{Storage.save({dims:S.dims,meas:S.meas,inspector:S.inspector,date:S.date,serial:S.serial});},500);}

async function loadData(){
  const data=await Storage.load();
  if(data){if(data.dims)S.dims=data.dims;if(data.meas)S.meas=data.meas;if(data.inspector!=null)S.inspector=data.inspector;if(data.date)S.date=data.date;if(data.serial!=null)S.serial=data.serial;S.dims.forEach(d=>{if(!S.meas[d.id])S.meas[d.id]=Array(ROUNDS).fill("");});}
  render();
}
if(useFirebase){Storage.onSync(data=>{if(data.dims)S.dims=data.dims;if(data.meas)S.meas=data.meas;if(data.inspector!=null)S.inspector=data.inspector;if(data.date)S.date=data.date;if(data.serial!=null)S.serial=data.serial;S.dims.forEach(d=>{if(!S.meas[d.id])S.meas[d.id]=Array(ROUNDS).fill("");});render();});}

// ═══════════════════════════════════════════
// DOM helpers
// ═══════════════════════════════════════════
function h(tag,attrs,...ch){const el=document.createElement(tag);if(attrs)Object.entries(attrs).forEach(([k,v])=>{if(k==="style"&&typeof v==="object")Object.assign(el.style,v);else if(k.startsWith("on"))el.addEventListener(k.slice(2).toLowerCase(),v);else if(k==="className")el.className=v;else if(k==="value")el.value=v;else el.setAttribute(k,v);});ch.flat(9).forEach(c=>{if(c==null||c===false)return;el.appendChild(typeof c==="string"||typeof c==="number"?document.createTextNode(c):c);});return el;}

function devBar(val,nom,up,lo){
  const w=h("div",{style:{position:"relative",height:"18px",width:"100%"}});if(!val||val==="")return w;const n=parseFloat(val);if(isNaN(n))return w;
  const dev=n-nom,range=up-lo;if(range===0)return w;const mg=range*0.6,dLo=lo-mg,dUp=up+mg,dR=dUp-dLo;
  const tL=((lo-dLo)/dR)*100,tW=(range/dR)*100,pos=Math.max(0,Math.min(100,((dev-dLo)/dR)*100)),ok=dev>=lo&&dev<=up;
  w.innerHTML=`<div style="position:absolute;left:0;right:0;top:4px;height:10px;background:#fecaca;border-radius:5px"></div><div style="position:absolute;left:${tL}%;width:${tW}%;top:4px;height:10px;background:#bbf7d0;border-radius:5px;border:1px solid #86efac"></div><div style="position:absolute;left:${pos}%;top:3px;width:12px;height:12px;border-radius:50%;transform:translateX(-50%);background:${ok?"#16a34a":"#dc2626"};border:2px solid #fff;box-shadow:0 0 5px ${ok?"rgba(22,163,74,0.4)":"rgba(220,38,38,0.4)"};z-index:2"></div>`;
  return w;
}

// ═══════════════════════════════════════════
// Render
// ═══════════════════════════════════════════
function render(){
  const app=document.getElementById("app");app.innerHTML="";
  // Header
  const syncBadge=useFirebase?h("span",{style:{fontSize:"10px",padding:"3px 10px",borderRadius:"12px",fontWeight:"600",background:"#dcfce7",color:"#16a34a"}},"☁ 同期中"):h("span",{style:{fontSize:"10px",padding:"3px 10px",borderRadius:"12px",fontWeight:"600",background:"#fef3c7",color:"#92400e"}},"📱 ローカル");
  const editBtn=S.tab==="tracker"?h("button",{style:{padding:"6px 14px",borderRadius:"6px",border:"none",background:S.showEditor?"#f59e0b":"#475569",color:"#fff",fontSize:"12px",fontWeight:"700"},onClick:()=>{S.showEditor=!S.showEditor;S.editId=null;S._form=null;render();}},S.showEditor?"✕ 閉じる":"✎ 寸法編集"):null;
  app.appendChild(h("div",{className:"no-print",style:{background:"#1e293b",borderRadius:"10px",padding:"12px 16px",marginBottom:"10px",color:"#fff",display:"flex",justifyContent:"space-between",alignItems:"center"}},h("div",{},h("div",{style:{fontSize:"10px",letterSpacing:"3px",color:"#f59e0b",fontWeight:"700"}},"CASE GEAR 0U9W-46365-00"),h("div",{style:{fontSize:"18px",fontWeight:"800"}},"寸法検査ツール")),h("div",{style:{display:"flex",alignItems:"center",gap:"8px"}},syncBadge,editBtn)));

  // Tabs

  app.appendChild(h("div",{className:"no-print",style:{display:"flex",gap:"4px",marginBottom:"10px"}},
    ...["tracker","report"].map(k=>{const lb=k==="tracker"?"🔧 ① 追い込み加工":`📄 ② 検査成績書${fc>0?` (${fc}件)`:""}`;return h("button",{style:{flex:"1",padding:"10px 12px",borderRadius:"8px",border:"none",background:S.tab===k?"#334155":"#fff",color:S.tab===k?"#fff":"#64748b",fontSize:"13px",fontWeight:"700",boxShadow:S.tab===k?"0 2px 8px rgba(0,0,0,0.15)":"0 1px 2px rgba(0,0,0,0.05)"},onClick:()=>{S.tab=k;render();}},lb);})
  ));

  if(S.tab==="tracker") renderTracker(app); else renderReport(app);
}

function renderTracker(app){

    function makeForm(isNew){
      const fm=S._form||{name:"",tClass:"",nominal:"",upper:"",lower:""};
      const wrap=h("div",{style:{background:isNew?"#f0fdf4":"#f0f9ff",border:`2px solid ${isNew?"#86efac":"#93c5fd"}`,borderRadius:"8px",padding:"10px",marginBottom:"4px"}});

        const inp=h("input",{type:f.t,value:fm[f.k],placeholder:f.p,step:"any",style:{width:"100%",padding:"6px",fontSize:"13px",border:"2px solid #e2e8f0",borderRadius:"5px",outline:"none",fontFamily:"inherit",background:"#f8fafc",boxSizing:"border-box"}});
        inp.addEventListener("input",e=>{fm[f.k]=e.target.value;S._form=fm;});inp.addEventListener("focus",e=>e.target.style.borderColor="#3b82f6");inp.addEventListener("blur",e=>e.target.style.borderColor="#e2e8f0");

      wrap.appendChild(h("div",{style:{fontSize:"11px",color:"#64748b",marginBottom:"6px"}},"上限値: "+(!isNaN(nom+up)?r4(nom+up):"—")+"　下限値: "+(!isNaN(nom+lo)?r4(nom+lo):"—")));
      wrap.appendChild(h("div",{style:{display:"flex",gap:"6px"}},
        h("button",{style:{padding:"5px 16px",borderRadius:"5px",border:"none",background:"#16a34a",color:"#fff",fontSize:"12px",fontWeight:"700"},onClick:()=>{
          const n=parseFloat(fm.nominal),u=parseFloat(fm.upper),l=parseFloat(fm.lower);if(!fm.name||isNaN(n)||isNaN(u)||isNaN(l))return;
          if(isNew){const nid=Math.max(0,...S.dims.map(d=>d.id))+1;S.dims.push({id:nid,name:fm.name,tClass:fm.tClass,nominal:n,upper:u,lower:l});S.meas[nid]=Array(ROUNDS).fill("");}
          else{const d=S.dims.find(d=>d.id===S.editId);if(d){d.name=fm.name;d.tClass=fm.tClass;d.nominal=n;d.upper=u;d.lower=l;}}
          S.editId=null;S._form=null;scheduleSave();render();
        }},isNew?"追加":"保存"),
        h("button",{style:{padding:"5px 16px",borderRadius:"5px",border:"2px solid #e2e8f0",background:"#fff",color:"#64748b",fontSize:"12px",fontWeight:"600"},onClick:()=>{S.editId=null;S._form=null;render();}},"キャンセル")
      ));
      return wrap;
    }

    S.dims.forEach((d,idx)=>{
      if(S.editId===d.id){ed.appendChild(makeForm(false));}
      else{ed.appendChild(h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"8px 10px",background:"#f8fafc",borderRadius:"6px",border:"1px solid #e2e8f0",marginBottom:"4px"}},
        h("div",{style:{display:"flex",alignItems:"center",gap:"8px",flexWrap:"wrap"}},h("span",{style:{fontSize:"11px",color:"#94a3b8",width:"20px"}},(idx+1)+"."),h("span",{style:{fontWeight:"700",fontSize:"14px"}},dName(d)),h("span",{style:{fontSize:"11px",color:"#64748b",fontFamily:"monospace"}},lLim(d)+" 〜 "+uLim(d)),h("span",{style:{fontSize:"10px",color:"#94a3b8"}},"("+fmtTol(d.upper)+" / "+fmtTol(d.lower)+")")),

    const inp=h("input",{type:f.t,value:S[f.k],placeholder:f.p,style:{width:"100%",border:"none",borderBottom:"2px solid #e2e8f0",fontSize:"14px",padding:"2px 0",outline:"none",background:"transparent",fontFamily:"inherit",color:"#334155",boxSizing:"border-box"}});

  });app.appendChild(info);

  // Summary
  const st=S.dims.reduce((a,d)=>{const j=judge(latest(d.id),d.nominal,d.upper,d.lower);if(j==="OK")a.ok++;else if(j==="NG")a.ng++;else a.none++;return a;},{ok:0,ng:0,none:0});
  const sm=h("div",{style:{display:"flex",gap:"6px",marginBottom:"10px"}});
  [{l:"全項目",c:S.dims.length,bg:"#e2e8f0",fg:"#334155"},{l:"OK",c:st.ok,bg:"#dcfce7",fg:"#16a34a"},{l:"NG",c:st.ng,bg:"#fee2e2",fg:"#dc2626"},{l:"未測定",c:st.none,bg:"#f1f5f9",fg:"#94a3b8"}].forEach(i=>{

  });app.appendChild(sm);

  for(let i=0;i<ROUNDS;i++)thr.appendChild(h("th",{style:{padding:"7px 3px",textAlign:"center",minWidth:"85px"}},(i+1)+"回目"));
  thr.appendChild(h("th",{style:{padding:"7px 4px",textAlign:"center",width:"100px"}},"状態"));

    tbd.appendChild(tr);

function renderReport(app){
  app.appendChild(h("div",{className:"no-print",style:{display:"flex",justifyContent:"flex-end",marginBottom:"10px"}},h("button",{style:{padding:"8px 24px",borderRadius:"8px",border:"none",background:"#334155",color:"#fff",fontSize:"13px",fontWeight:"700"},onClick:()=>window.print()},"印刷 / PDF保存")));
  const rp=h("div",{className:"print-area",style:{background:"#fff",borderRadius:"10px",padding:"24px",boxShadow:"0 1px 4px rgba(0,0,0,0.08)"}});
  rp.appendChild(h("div",{style:{fontSize:"20px",fontWeight:"800",marginBottom:"6px",color:"#1e293b"}},"検査成績書"));
  rp.appendChild(h("div",{style:{fontSize:"12px",color:"#475569",marginBottom:"4px"}},"図番: 0U9W-46365-00　　品名: CASE GEAR"));
  rp.appendChild(h("div",{style:{fontSize:"12px",color:"#475569",marginBottom:"16px"}},"検査日: "+S.date+"　　担当: "+S.inspector+(S.serial?"　　S/N: "+S.serial:"")));
  const tbl=h("table",{style:{width:"100%",borderCollapse:"collapse",fontSize:"13px"}});
  const thd=h("thead",{});const tr=h("tr",{style:{background:"#334155",color:"#fff",fontSize:"11px"}});
  [{t:"No.",w:"36px"},{t:"寸法"},{t:"上限値"},{t:"下限値"},{t:"実測値"},{t:"判定",w:"50px"}].forEach(c=>tr.appendChild(h("th",{style:{padding:"8px 6px",textAlign:c.t==="寸法"?"left":"center",width:c.w||"auto"}},c.t)));
  thd.appendChild(tr);tbl.appendChild(thd);
  const tbd=h("tbody",{});
  S.dims.forEach((dim,idx)=>{const lv=latest(dim.id);const j=judge(lv,dim.nominal,dim.upper,dim.lower);
    const r=h("tr",{style:{borderBottom:"1px solid #e2e8f0",background:j==="NG"?"#fef2f2":"transparent"}});
    r.appendChild(h("td",{style:{padding:"9px 6px",textAlign:"center",color:"#94a3b8"}},""+(idx+1)));
    r.appendChild(h("td",{style:{padding:"9px 6px",fontWeight:"700",fontSize:"14px"}},dName(dim)));
    r.appendChild(h("td",{style:{padding:"9px 6px",textAlign:"center",fontFamily:"monospace"}},""+uLim(dim)));
    r.appendChild(h("td",{style:{padding:"9px 6px",textAlign:"center",fontFamily:"monospace"}},""+lLim(dim)));
    r.appendChild(h("td",{style:{padding:"9px 6px",textAlign:"center",fontFamily:"monospace",fontWeight:"700",fontSize:"14px",color:lv?(j==="OK"?"#16a34a":"#dc2626"):"#cbd5e1"}},lv||"—"));
    const jt=h("td",{style:{padding:"9px 6px",textAlign:"center"}});if(j)jt.appendChild(h("span",{style:{fontWeight:"800",color:j==="OK"?"#16a34a":"#dc2626"}},j));else jt.textContent="—";
    r.appendChild(jt);tbd.appendChild(r);
  });tbl.appendChild(tbd);rp.appendChild(tbl);app.appendChild(rp);
}

loadData();
